<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notion Clock</title>
  <style>
    :root{
      --bg:#0b0f14;
      --fg:#e6edf3;
      --sub:#9aa7b2;
      --accent:#6ee7ff;
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:var(--font);}
    .wrap{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
      box-sizing:border-box;
    }
    .card{
      width:min(560px, 100%);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:22px 22px 18px;
      background:rgba(255,255,255,.03);
      backdrop-filter: blur(6px);
    }
    .time{
      font-size: clamp(44px, 8vw, 72px);
      font-weight: 800;
      letter-spacing: .06em;
      line-height: 1.05;
      font-variant-numeric: tabular-nums;
    }
    .date{
      margin-top:10px;
      font-size: 14px;
      color: var(--sub);
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--accent);
      box-shadow: 0 0 16px rgba(110,231,255,.55);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="time" class="time">--:--:--</div>
      <div class="date">
        <span class="pill"><span class="dot"></span><span id="tzLabel">Local</span></span>
        <span class="pill" id="date">----</span>
      </div>
    </div>
  </div>

<script>
(function(){
  const qs = new URLSearchParams(location.search);

  // 任意カスタム（URLに ?bg=...&fg=...&accent=...&tz=Asia/Tokyo とか付けられる）
  const bg     = qs.get("bg");
  const fg     = qs.get("fg");
  const accent = qs.get("accent");
  const tz     = qs.get("tz");           // 例: Asia/Tokyo
  const h12    = qs.get("h12") === "1";  // 12時間表記にしたいなら ?h12=1

  const root = document.documentElement.style;
  if (bg) root.setProperty("--bg", bg);
  if (fg) root.setProperty("--fg", fg);
  if (accent) root.setProperty("--accent", accent);

  const elTime = document.getElementById("time");
  const elDate = document.getElementById("date");
  const elTz   = document.getElementById("tzLabel");
  elTz.textContent = tz ? tz : "Local";

  const fmtTime = new Intl.DateTimeFormat("ja-JP", {
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: h12,
    ...(tz ? { timeZone: tz } : {})
  });

  const fmtDate = new Intl.DateTimeFormat("ja-JP", {
    year:"numeric", month:"2-digit", day:"2-digit", weekday:"short",
    ...(tz ? { timeZone: tz } : {})
  });

  function tick(){
    const now = new Date();
    elTime.textContent = fmtTime.format(now);
    elDate.textContent = fmtDate.format(now);
  }
  tick();
  setInterval(tick, 250); // Notion埋め込みでも体感ズレにくいよう少し細かめ
})();
</script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clock Builder</title>
  <style>
    :root{
      --bg:#0b0f14; --fg:#e6edf3; --mut:#9aa7b2; --card:#101826; --line:rgba(255,255,255,.10);
      --font: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:var(--font);}
    .wrap{max-width:1100px;margin:0 auto;padding:16px;box-sizing:border-box;}
    .grid{display:grid;grid-template-columns: 360px 1fr; gap:14px;}
    .panel,.preview{border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.03);}
    .panel{padding:14px;}
    .preview{padding:14px;display:flex;flex-direction:column;gap:10px;}
    h1{font-size:16px;margin:0 0 10px 0;}
    .row{display:grid;grid-template-columns: 1fr 1fr; gap:10px;}
    label{display:block;font-size:12px;color:var(--mut);margin:10px 0 6px;}
    select,input[type="text"],input[type="number"]{
      width:100%;box-sizing:border-box;border-radius:10px;border:1px solid var(--line);
      background:rgba(255,255,255,.04);color:var(--fg);padding:10px;font-size:13px;
      outline:none;
    }
    input[type="color"]{width:100%;height:42px;border-radius:10px;border:1px solid var(--line);background:transparent;padding:4px;box-sizing:border-box;}
    .tog{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
    .tog label{margin:0;color:var(--fg);font-size:13px;display:flex;gap:8px;align-items:center}
    .tog input{transform:scale(1.05)}
    .urlbox{
      border:1px solid var(--line);border-radius:12px;padding:10px;background:rgba(0,0,0,.25);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px; overflow:auto; white-space:nowrap;
    }
    button{
      border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--fg);
      padding:10px 12px;border-radius:12px;cursor:pointer;
    }
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    iframe{width:100%;height:320px;border:1px solid var(--line);border-radius:12px;background:#000;}
    .note{font-size:12px;color:var(--mut);line-height:1.5}
    @media (max-width: 920px){ .grid{grid-template-columns:1fr;} iframe{height:260px;} }
  </style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="panel">
      <h1>Clock Builder（設定 → 埋め込みURL発行）</h1>

      <label>レイアウト</label>
      <select id="layout">
        <option value="card">card（中央カード）</option>
        <option value="bar">bar（横長バー）</option>
        <option value="minimal">minimal（透過ミニ）</option>
      </select>

      <div class="row">
        <div>
          <label>配置</label>
          <select id="align">
            <option value="left">left</option>
            <option value="center" selected>center</option>
            <option value="right">right</option>
          </select>
        </div>
        <div>
          <label>タイムゾーン</label>
          <input id="tz" type="text" placeholder="Asia/Tokyo" value="Asia/Tokyo" />
        </div>
      </div>

      <label>表示</label>
      <div class="tog">
        <label><input id="sec" type="checkbox" checked> 秒</label>
        <label><input id="date" type="checkbox" checked> 日付</label>
        <label><input id="tzShow" type="checkbox" checked> TZラベル</label>
        <label><input id="h12" type="checkbox"> 12時間表記</label>
        <label><input id="shadow" type="checkbox" checked> 影</label>
      </div>

      <div class="row">
        <div>
          <label>スケール（文字サイズ）</label>
          <input id="scale" type="number" min="0.7" max="1.5" step="0.05" value="1" />
        </div>
        <div>
          <label>角丸(px)</label>
          <input id="radius" type="number" min="0" max="40" step="1" value="18" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>余白(px)</label>
          <input id="pad" type="number" min="0" max="40" step="1" value="18" />
        </div>
        <div>
          <label>背景（ページ）</label>
          <input id="bg" type="text" value="transparent" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>カード背景</label>
          <input id="cardBg" type="text" value="rgba(0,0,0,.35)" />
        </div>
        <div>
          <label>アクセント</label>
          <input id="accent" type="color" value="#6ee7ff" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>文字色</label>
          <input id="fg" type="color" value="#e6edf3" />
        </div>
        <div>
          <label>サブ文字（date等）</label>
          <input id="sub" type="text" value="rgba(230,237,243,.75)" />
        </div>
      </div>

      <label>埋め込みURL（Notionに貼る）</label>
      <div id="url" class="urlbox"></div>
      <div class="actions" style="margin-top:10px;">
        <button id="copy">URLコピー</button>
        <button id="open">新規タブで開く</button>
      </div>

      <p class="note" style="margin-top:10px;">
        背景をNotionに馴染ませるなら <b>bg=transparent</b> のままが無難です。<br>
        透過が嫌なら bg を <b>#0b0f14</b> のように指定。
      </p>
    </div>

    <div class="preview">
      <div class="note">プレビュー（埋め込み表示のイメージ）</div>
      <iframe id="frame" src="./clock.html?tz=Asia%2FTokyo"></iframe>
      <div class="note">Notion側は /embed で上のURLを貼るだけ。</div>
    </div>
  </div>
</div>

<script>
(function(){
  const $ = (id)=>document.getElementById(id);

  const fields = ["layout","align","tz","sec","date","tzShow","h12","shadow","scale","radius","pad","bg","cardBg","accent","fg","sub"];
  const base = () => {
    const here = new URL(location.href);
    here.pathname = here.pathname.replace(/\/[^\/]*$/, "/clock.html");
    here.search = "";
    here.hash = "";
    return here.toString();
  };

  function buildUrl(){
    const u = new URL(base());
    const set = (k,v)=>u.searchParams.set(k,v);

    set("layout", $("layout").value);
    set("align", $("align").value);
    set("tz", $("tz").value.trim() || "Asia/Tokyo");

    set("sec", $("sec").checked ? "1":"0");
    set("date", $("date").checked ? "1":"0");
    set("tzShow", $("tzShow").checked ? "1":"0");
    set("h12", $("h12").checked ? "1":"0");
    set("shadow", $("shadow").checked ? "1":"0");

    set("scale", String($("scale").value));
    set("radius", String($("radius").value));
    set("pad", String($("pad").value));

    set("bg", $("bg").value.trim() || "transparent");
    set("cardBg", $("cardBg").value.trim() || "rgba(0,0,0,.35)");
    set("accent", $("accent").value);
    set("fg", $("fg").value);
    set("sub", $("sub").value.trim() || "rgba(230,237,243,.75)");

    return u.toString();
  }

  function refresh(){
    const url = buildUrl();
    $("url").textContent = url;
    $("frame").src = url;
  }

  fields.forEach(id=>{
    const el = $(id);
    el.addEventListener("input", refresh);
    el.addEventListener("change", refresh);
  });

  $("copy").addEventListener("click", async ()=>{
    const url = $("url").textContent;
    try{
      await navigator.clipboard.writeText(url);
      $("copy").textContent = "コピーしました";
      setTimeout(()=> $("copy").textContent = "URLコピー", 900);
    }catch(e){
      prompt("手動コピーしてください", url);
    }
  });

  $("open").addEventListener("click", ()=>{
    window.open($("url").textContent, "_blank");
  });

  refresh();
})();
</script>
</body>
</html>

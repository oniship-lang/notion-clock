<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Clock Builder</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #111827;
      --panel-2: #0f172a;
      --border: rgba(255, 255, 255, 0.12);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 20% -10%, #1e293b 0%, var(--bg) 45%);
      color: var(--text);
      font-family: Inter, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    }
    .page {
      display: grid;
      grid-template-columns: minmax(320px, 460px) 1fr;
      min-height: 100vh;
      gap: 18px;
      padding: 18px;
    }
    .panel {
      background: linear-gradient(180deg, var(--panel) 0%, #0d1425 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
    }
    .header h1 { margin: 0 0 6px; font-size: 1.15rem; }
    .header p { margin: 0 0 12px; color: var(--muted); font-size: .9rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: .79rem; color: var(--muted); }
    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.9rem;
    }
    .field input[type="checkbox"] { width: 18px; height: 18px; }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      min-height: 41px;
    }
    .full { grid-column: 1 / -1; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    button {
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #18243b;
      color: var(--text);
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary { background: #1f3a66; border-color: #2f4f84; }
    button:hover { filter: brightness(1.08); }
    .note {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.45;
    }
    .warning {
      margin-top: 10px;
      padding: 8px 10px;
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      color: #fde68a;
      font-size: 0.85rem;
      display: none;
    }
    .preview {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    iframe {
      width: 100%;
      min-height: 70vh;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: repeating-linear-gradient(45deg, #0d1424, #0d1424 10px, #121b2f 10px, #121b2f 20px);
    }
    @media (max-width: 980px) {
      .page { grid-template-columns: 1fr; }
      iframe { min-height: 45vh; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <div class="header">
        <h1>Notion Clock Builder</h1>
        <p>見た目を調整して、Notionの <code>/embed</code> に貼るURLを作成します。</p>
      </div>

      <div class="grid" id="controls"></div>

      <div class="actions">
        <button class="primary" id="copyBtn">URLコピー</button>
        <button id="openBtn">新規タブで開く</button>
        <button id="jsonCopyBtn">profile用JSONをコピー</button>
      </div>

      <div class="field full" style="margin-top:10px;">
        <label for="embedUrl">埋め込みURL</label>
        <textarea id="embedUrl" rows="3" readonly></textarea>
      </div>

      <div id="warning" class="warning"></div>

      <div class="field full" style="margin-top:10px;">
        <label for="profileJson">presets.json に貼る profile JSON（例: "myProfile": {...}）</label>
        <textarea id="profileJson" rows="7" readonly></textarea>
      </div>

      <p class="note">注意: Notionは <code>file://</code> や <code>localhost</code> のURLを埋め込めません。公開された <code>https://</code> URL を使ってください。</p>
    </section>

    <section class="panel preview">
      <h2 style="margin:0; font-size:1rem;">プレビュー</h2>
      <iframe id="preview" title="Clock preview"></iframe>
    </section>
  </div>

  <script>
    (function init() {
      const defaults = {
        profile: '',
        layout: 'card',
        align: 'center',
        tz: 'Asia/Tokyo',
        sec: '1',
        date: '1',
        tzShow: '1',
        h12: '0',
        scale: '1',
        bg: 'transparent',
        cardBg: 'rgba(17,24,39,0.78)',
        fg: '#f9fafb',
        sub: '#9ca3af',
        accent: '#60a5fa',
        radius: '16',
        pad: '16',
        shadow: '1'
      };

      const fields = [
        { key: 'baseUrl', type: 'text', label: 'ベースURL（任意）', value: '', full: true, placeholder: 'https://user.github.io/repo/' },
        { key: 'profile', type: 'text', label: 'profile名（任意）', value: defaults.profile },
        { key: 'layout', type: 'select', label: 'layout', value: defaults.layout, options: ['card', 'bar', 'minimal'] },
        { key: 'align', type: 'select', label: 'align', value: defaults.align, options: ['left', 'center', 'right'] },
        { key: 'tz', type: 'text', label: 'tz (IANA)', value: defaults.tz },
        { key: 'h12', type: 'checkbox', label: '12時間表記', value: defaults.h12 },
        { key: 'sec', type: 'checkbox', label: '秒表示', value: defaults.sec },
        { key: 'date', type: 'checkbox', label: '日付表示', value: defaults.date },
        { key: 'tzShow', type: 'checkbox', label: 'TZラベル表示', value: defaults.tzShow },
        { key: 'shadow', type: 'checkbox', label: '影を表示', value: defaults.shadow },
        { key: 'scale', type: 'number', label: 'scale (0.7〜1.5)', value: defaults.scale, attrs: { min: '0.7', max: '1.5', step: '0.05' } },
        { key: 'radius', type: 'number', label: 'radius(px)', value: defaults.radius, attrs: { min: '0', max: '64', step: '1' } },
        { key: 'pad', type: 'number', label: 'pad(px)', value: defaults.pad, attrs: { min: '0', max: '64', step: '1' } },
        { key: 'bg', type: 'text', label: 'bg', value: defaults.bg },
        { key: 'cardBg', type: 'text', label: 'cardBg', value: defaults.cardBg },
        { key: 'fg', type: 'color', label: 'fg', value: defaults.fg },
        { key: 'sub', type: 'color', label: 'sub', value: defaults.sub },
        { key: 'accent', type: 'color', label: 'accent', value: defaults.accent }
      ];

      const controlsEl = document.getElementById('controls');
      const previewEl = document.getElementById('preview');
      const urlEl = document.getElementById('embedUrl');
      const warningEl = document.getElementById('warning');
      const profileJsonEl = document.getElementById('profileJson');
      const state = { ...defaults, baseUrl: '' };

      function createInput(field) {
        const wrap = document.createElement('div');
        wrap.className = 'field' + (field.full ? ' full' : '');

        const label = document.createElement('label');
        label.htmlFor = field.key;
        label.textContent = field.label;
        wrap.appendChild(label);

        let input;
        if (field.type === 'select') {
          input = document.createElement('select');
          for (const opt of field.options) {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt;
            input.appendChild(option);
          }
          input.value = field.value;
          wrap.appendChild(input);
        } else if (field.type === 'checkbox') {
          const box = document.createElement('div');
          box.className = 'toggle';
          input = document.createElement('input');
          input.type = 'checkbox';
          input.checked = field.value === '1';
          const txt = document.createElement('span');
          txt.textContent = field.value === '1' ? 'ON' : 'OFF';
          input.addEventListener('change', () => {
            txt.textContent = input.checked ? 'ON' : 'OFF';
          });
          box.appendChild(txt);
          box.appendChild(input);
          wrap.appendChild(box);
        } else {
          input = document.createElement('input');
          input.type = field.type;
          input.value = field.value;
          if (field.placeholder) input.placeholder = field.placeholder;
          if (field.attrs) {
            Object.entries(field.attrs).forEach(([k, v]) => input.setAttribute(k, v));
          }
          wrap.appendChild(input);
        }

        input.id = field.key;
        input.addEventListener('input', sync);
        if (field.type === 'checkbox') {
          input.addEventListener('change', sync);
        }
        controlsEl.appendChild(wrap);
      }

      fields.forEach(createInput);

      function readState() {
        for (const field of fields) {
          const el = document.getElementById(field.key);
          if (!el) continue;
          if (field.type === 'checkbox') {
            state[field.key] = el.checked ? '1' : '0';
          } else {
            state[field.key] = el.value.trim();
          }
        }

        if (!Number.isFinite(Number(state.scale))) state.scale = defaults.scale;
        if (!Number.isFinite(Number(state.radius))) state.radius = defaults.radius;
        if (!Number.isFinite(Number(state.pad))) state.pad = defaults.pad;
      }

      function resolveClockBase() {
        if (state.baseUrl) {
          try {
            return new URL('./clock.html', state.baseUrl).toString();
          } catch {
            return new URL('./clock.html', location.href).toString();
          }
        }
        return new URL('./clock.html', location.href).toString();
      }

      function buildUrl() {
        const base = resolveClockBase();
        const url = new URL(base);

        const pairs = {
          profile: state.profile,
          layout: state.layout,
          align: state.align,
          tz: state.tz,
          sec: state.sec,
          date: state.date,
          tzShow: state.tzShow,
          h12: state.h12,
          scale: state.scale,
          bg: state.bg,
          cardBg: state.cardBg,
          fg: state.fg,
          sub: state.sub,
          accent: state.accent,
          radius: state.radius,
          pad: state.pad,
          shadow: state.shadow
        };

        Object.entries(pairs).forEach(([k, v]) => {
          if (v !== '' && v != null) url.searchParams.set(k, v);
        });

        return url;
      }

      function detectInvalidForNotion(url) {
        const host = url.hostname;
        const protocol = url.protocol;
        return protocol === 'file:' || host === 'localhost' || host === '127.0.0.1' || host === '::1';
      }

      function buildProfileJson() {
        const profileName = state.profile || 'myProfile';
        const data = {
          layout: state.layout,
          align: state.align,
          tz: state.tz,
          sec: state.sec,
          date: state.date,
          tzShow: state.tzShow,
          h12: state.h12,
          scale: state.scale,
          bg: state.bg,
          cardBg: state.cardBg,
          fg: state.fg,
          sub: state.sub,
          accent: state.accent,
          radius: state.radius,
          pad: state.pad,
          shadow: state.shadow
        };
        return JSON.stringify({ [profileName]: data }, null, 2);
      }

      async function copyText(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch {
          window.prompt('コピーできなかったため手動でコピーしてください', text);
          return false;
        }
      }

      function sync() {
        readState();
        const url = buildUrl();
        const finalUrl = url.toString();
        urlEl.value = finalUrl;
        previewEl.src = finalUrl;
        profileJsonEl.value = buildProfileJson();

        if (detectInvalidForNotion(url)) {
          warningEl.style.display = 'block';
          warningEl.textContent = 'このURLは file:// または localhost 系のため Notion では利用できません。GitHub Pages などで https 公開してから埋め込んでください。';
        } else {
          warningEl.style.display = 'none';
          warningEl.textContent = '';
        }
      }

      document.getElementById('copyBtn').addEventListener('click', () => copyText(urlEl.value));
      document.getElementById('openBtn').addEventListener('click', () => {
        window.open(urlEl.value, '_blank', 'noopener,noreferrer');
      });
      document.getElementById('jsonCopyBtn').addEventListener('click', () => copyText(profileJsonEl.value));

      sync();
    })();
  </script>
</body>
</html>
